<!-- ══════════════════════════════════════
     CHATBOT HTML
     Copy this before </body> tag in all pages
══════════════════════════════════════ -->

<!-- CHATBOT FAB -->
<button class="chat-fab" id="chat-fab" title="Chat with AI Assistant">💬</button>

<!-- CHATBOT WIDGET -->
<!-- 
  IMPORTANT: To enable the Gemini AI chatbot, replace 'YOUR_GEMINI_API_KEY_HERE' 
  in chatbot.js with your actual Gemini API key.
  Get your free API key at: https://makersuite.google.com/app/apikey
-->
<div class="chat-widget" id="chat-widget">
  <div class="chat-header">
    <h3>
      <span>🤖</span>
      Ask about Sukil
    </h3>
    <button class="chat-close" id="chat-close">✕</button>
  </div>
  
  <div class="chat-messages" id="chat-messages">
    <div class="chat-message bot">
      <div class="chat-avatar">🤖</div>
      <div class="chat-bubble">
        Hi! I'm Sukil's AI assistant. I can answer questions about his skills, projects, experience, and background. What would you like to know?
      </div>
    </div>
  </div>
  
  <div class="chat-input-area">
    <div class="chat-input-wrapper">
      <input type="text" class="chat-input" id="chat-input" placeholder="Ask me anything about Sukil..." />
      <button class="chat-send" id="chat-send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Include chatbot JavaScript -->
<script src="chatbot.js"></script>
